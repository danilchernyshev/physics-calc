# PR-level continuous-integration gate (#163).
#
# The release pipeline (release.yml) is tag-triggered, so before this workflow
# nothing ran on pull requests — not even pytest, and crucially never the
# PyInstaller freeze. Two build-breaking spec bugs reached `master` that way (a
# never-bundled `gi`, then a wrong `runtime_hooks` path; see #158). This workflow
# runs on every PR and on push to `master` and actually **freezes the Linux
# bundle and launches its GTK backend under xvfb**, so a broken spec fails here
# instead of at the next release. It publishes nothing — release.yml stays the
# sole publisher.

name: CI

on:
  pull_request:
  push:
    branches: [master]

# Cancel a previous run of this workflow on the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The same pytest gate the release workflow runs, but on every PR/push so a red
  # tree is caught long before a tag.
  test:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
      - name: Run the test suite
        run: uv run --extra dev pytest

  # Freeze the one-folder bundle from packaging/study-calc.spec and launch the
  # GTK backend headlessly. This exercises the exact spec path release.yml's
  # linux-appimage/linux-deb jobs use, so a wrong runtime_hooks path or an
  # uncollected gi.repository typelib fails the PR rather than the release.
  linux-freeze-smoke:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install the PyWebView GTK/WebKit backend + xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgirepository1.0-dev libcairo2-dev pkg-config \
            gir1.2-webkit2-4.1 libwebkit2gtk-4.1-0 python3-gi \
            xvfb
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
      - name: Build via the real release scripts (AppImage + .deb)
        # Run the ACTUAL build scripts the release uses — not a bare `pyinstaller`
        # — so a regression in their freeze env or package tree fails the PR, not
        # the release. (A bare freeze here missed the v0.8.1 break: the scripts'
        # inner `uv run` froze without pygobject → gi-less bundle, and AppImage's
        # hicolor mkdir was absent.) build_appimage.sh freezes (bundling gi via its
        # own PYGOBJECT pin) and seals the AppImage; REUSE_BUNDLE=1 build_deb.sh
        # reuses that freeze and runs dpkg-deb — exercising both scripts end to end.
        run: |
          bash packaging/linux/build_appimage.sh
          REUSE_BUNDLE=1 bash packaging/linux/build_deb.sh
          test -x dist/study-calc/study-calc
      - name: GUI-smoke the frozen bundle via the launcher
        # The GUI check runs through the frozen launcher so it loads the bundle's
        # OWN gi + typelibs; running smoke_test.py here would test this venv (no
        # bundled gi) and validate nothing (#158). timeout guards a pre-exit hang;
        # --smoke-gui exits 0 only on a healthy backend.
        run: |
          uv run --extra dev python packaging/smoke_test.py --bundle dist/study-calc
          xvfb-run -a timeout 90 dist/study-calc/study-calc --smoke-gui
