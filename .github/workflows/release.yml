# Tag-triggered release pipeline (#67, epic #60).
#
# Pushing a `v*` tag (e.g. `git tag v0.7.0 && git push --tags`) runs the test gate,
# builds every available platform artifact, smoke-tests each one, and publishes
# them to a GitHub Release. The version is single-sourced from `pyproject.toml`.
#
# All five platform artifacts are wired: the test gate, the Linux AppImage (#66)
# and Flatpak (#65), the Windows installer (#63), the macOS DMG (#64), and the
# Release publish — which also attaches a SHA256SUMS manifest of every asset
# (consumed by the in-app self-update, #94).
# Each job follows the same shape: `needs: test`, build, run packaging/
# smoke_test.py, then upload-artifact with the canonical asset name. The release
# job globs every uploaded artifact, so adding a builder needs no change there.

name: Release

on:
  push:
    tags:
      - "v*"

# Least privilege: permissions are scoped per job (no workflow-level grant).
# Only the `release` job that publishes assets gets `contents: write`; every
# other job is read-only.
jobs:
  # The gate: a pytest failure here blocks every build job below (they `needs: test`),
  # so no artifact is ever produced from a red tree.
  test:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
      - name: Run the test suite (release gate)
        run: uv run --extra dev pytest

  resolve-version:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Read project.version from pyproject.toml
        id: v
        run: |
          version="$(grep -m1 '^version' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${version}"
      - name: Tag must match pyproject version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          if [ "${tag}" != "${{ steps.v.outputs.version }}" ]; then
            echo "Tag v${tag} does not match pyproject version ${{ steps.v.outputs.version }}" >&2
            exit 1
          fi

  linux-appimage:
    needs: [test, resolve-version]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Install the PyWebView GTK/WebKit backend (build + runtime)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgirepository1.0-dev libcairo2-dev pkg-config \
            gir1.2-webkit2-4.1 libwebkit2gtk-4.1-0 python3-gi
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
      - name: Build the AppImage
        # PyGObject lets the frozen build import pywebview's GTK backend; the AppImage
        # itself relies on the host's libwebkit2gtk-4.1-0 (see packaging/linux/README.md).
        # Pin < 3.52: from 3.52 PyGObject builds against girepository-2.0 (glib 2.80+),
        # which ubuntu-22.04 lacks (it ships the girepository-1.0 dev headers).
        run: |
          uv run --extra packaging --with "pygobject<3.52" \
            bash packaging/linux/build_appimage.sh
      - name: Smoke-test the built AppImage
        run: |
          ./dist/study-calc-${VERSION}-linux.AppImage --appimage-extract
          uv run --extra dev python packaging/smoke_test.py --bundle squashfs-root/usr/bin
      - name: Upload the AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: study-calc-${{ env.VERSION }}-linux.AppImage
          path: dist/study-calc-${{ env.VERSION }}-linux.AppImage
          if-no-files-found: error

  windows-installer:
    needs: [test, resolve-version]
    runs-on: windows-2022
    permissions:
      contents: read
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
      - name: Build the installer
        # build_installer.ps1 freezes with PyInstaller, smoke-tests the bundle,
        # generates the icon, fetches the WebView2 bootstrapper, and compiles the
        # .iss with Inno Setup (preinstalled on the windows-2022 runner image).
        shell: pwsh
        run: |
          uv run --extra packaging powershell -File packaging/windows/build_installer.ps1
      - name: Upload the installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: study-calc-${{ env.VERSION }}-windows-setup.exe
          path: packaging/windows/Output/study-calc-${{ env.VERSION }}-windows-setup.exe
          if-no-files-found: error

  macos-dmg:
    needs: [test, resolve-version]
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - runner: macos-14   # Apple Silicon
            arch: arm64
          - runner: macos-13   # Intel
            arch: intel
    runs-on: ${{ matrix.runner }}
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
      - name: Build the DMG
        # build_dmg.sh generates the icns, freezes with the shared spec (its
        # darwin branch emits Study Calc.app), smoke-tests the bundle, and packs
        # the DMG named for this runner's architecture.
        run: uv run --extra packaging bash packaging/macos/build_dmg.sh
      - name: Upload the DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: study-calc-${{ env.VERSION }}-macos-${{ matrix.arch }}.dmg
          path: dist/study-calc-${{ env.VERSION }}-macos-${{ matrix.arch }}.dmg
          if-no-files-found: error

  linux-flatpak:
    needs: [test, resolve-version]
    # ubuntu-24.04 (not 22.04): jammy's apt flatpak-builder is 1.2.x, which runs
    # the legacy `appstream-compose` (appstream-glib) binary in the final catalog
    # step — but org.gnome.Sdk//47 dropped it for `appstreamcli compose`
    # (AppStream 1.0), so the build died with
    # `bwrap: execvp appstream-compose: No such file or directory` (#140). noble
    # ships flatpak-builder 1.4.x, which calls `appstreamcli compose` instead.
    runs-on: ubuntu-24.04
    # continue-on-error stays one more cycle: the flatpak job only runs on a
    # tagged release pipeline (no PR-time CI), so this lets the next tagged run
    # confirm the 24.04 runner actually exports the bundle without re-blocking
    # the 4 shipping platforms. Once a tagged run is green, drop this and re-add
    # linux-flatpak to `release.needs` below (the rest of #140's acceptance).
    continue-on-error: true
    permissions:
      contents: read
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Flatpak + flatpak-builder and the Flathub remote
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --if-not-exists --user \
            flathub https://flathub.org/repo/flathub.flatpakrepo
      - name: Fetch flatpak-pip-generator (vendors the pinned Python deps)
        run: |
          # pip/flatpak-pip-generator is a symlink to flatpak-pip-generator.py;
          # raw.githubusercontent returns the symlink target text, not the script,
          # so fetch the real .py file. It has a python3 shebang, so it runs once
          # made executable.
          curl -fsSL -o flatpak-pip-generator.py \
            https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/master/pip/flatpak-pip-generator.py
          chmod +x flatpak-pip-generator.py
          # The generator needs requirements-parser to resolve the deps.
          pip install --user requirements-parser
      - name: Build the Flatpak bundle
        # build_flatpak.sh generates python3-deps.yaml, installs the GNOME
        # runtime/SDK, builds with flatpak-builder, exports the .flatpak, and
        # runs the headless smoke test inside the freshly built sandbox.
        env:
          FLATPAK_PIP_GENERATOR: ${{ github.workspace }}/flatpak-pip-generator.py
        run: bash packaging/flatpak/build_flatpak.sh
      - name: Upload the Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: study-calc-${{ env.VERSION }}-linux.flatpak
          path: dist/study-calc-${{ env.VERSION }}-linux.flatpak
          if-no-files-found: error

  # Collect every built artifact and attach them to the GitHub Release. New
  # platform jobs just add themselves to `needs` and upload an artifact — the glob
  # below picks them up automatically.
  #
  # linux-flatpak is temporarily omitted here while #140 (appstream-compose on
  # GNOME SDK 47) is fixed, so v0.8.0 can ship the 4 working platforms; re-add it
  # once #140 lands. The artifact glob still picks up the .flatpak automatically
  # if/when the job succeeds.
  release:
    needs: [linux-appimage, windows-installer, macos-dmg]
    runs-on: ubuntu-22.04
    permissions:
      contents: write # publish the Release and upload assets
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts and generate SHA256SUMS
        # download-artifact nests each upload in its own directory; flatten to a
        # single assets/ dir, then checksum every file by basename so the manifest
        # matches the flat Release asset names (the in-app self-update verifies
        # against this, #94).
        run: |
          mkdir -p assets
          find artifacts -type f -exec cp -t assets {} +
          cd assets
          # Checksum every asset by basename, excluding the manifest itself.
          find . -maxdepth 1 -type f ! -name SHA256SUMS -printf '%P\n' | sort \
            | xargs sha256sum > SHA256SUMS
          echo "Published assets:" && ls -1 && echo "---" && cat SHA256SUMS
      - name: Publish the GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: assets/*
          fail_on_unmatched_files: true
          generate_release_notes: true
