[project]
name = "physics-calc"
version = "0.1.0"
description = "Физический калькулятор: механика, термодинамика, электромагнетизм, волны и конвертер единиц с GUI на Tkinter"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Danil Chernyshev", email = "danil.chernyshev@gmail.com" }]
keywords = ["physics", "calculator", "units", "tkinter", "gui"]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.scripts]
physics-calc = "physics_calc.gui:run"

[project.gui-scripts]
physics-calc-gui = "physics_calc.gui:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["physics_calc"]

[tool.pytest.ini_options]
testpaths = ["tests"]
